# ArgoCD Application - issuance-consumer (Ch10 Phase G, ADR-021).
# See issue-api.yaml for how __PLACEHOLDER__ values are filled at bootstrap.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: issuance-consumer
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/airflowboy/sre-project.git
    targetRevision: main
    path: helm/issuance-consumer
    helm:
      parameters:
        - name: serviceAccount.roleArn
          value: __CONSUMER_ROLE_ARN__
        - name: env.secretDbUrlArn
          value: __SECRET_DB_URL_ARN__
        - name: env.kafkaBrokers
          value: issuance-kafka-bootstrap.kafka.svc.cluster.local:9092
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
