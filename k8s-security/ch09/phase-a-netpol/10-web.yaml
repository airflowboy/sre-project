# The "server" side of the NetworkPolicy demo — plain nginx.
# Label app=web is what the policy in 40- targets.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: demo-sec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: demo-sec
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
