# RoleBinding glues a Role to one or more subjects (User / Group / ServiceAccount).
# Without this, the Role exists but nobody has those permissions.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: reader-can-read-pods
  namespace: demo-sec
subjects:
  - kind: ServiceAccount
    name: reader
    namespace: demo-sec
roleRef:
  kind: Role
  name: pod-reader
  apiGroup: rbac.authorization.k8s.io
