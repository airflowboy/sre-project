# Connection settings for the Terraform-provisioned EC2 (Ch 08 Phase D).
# Run ansible-playbook from this directory so this file is picked up.
[defaults]
remote_user          = ec2-user            # AL2023's default login user
private_key_file     = ~/.ssh/ec2-ch08     # the key Terraform registered as the EC2 key pair
host_key_checking    = False                # a freshly-created EC2 has an unknown host key
interpreter_python   = auto_silent
