# Connection settings for the Terraform-provisioned EC2 (Ch 08 Phase D).
# Run ansible-playbook from this directory so this file is picked up.
# NOTE: ansible's INI parser does NOT strip inline (#) comments, so keep
# comments on their own lines — never after a value.
[defaults]
# AL2023's default login user
remote_user = ec2-user
# the key Terraform registered as the EC2 key pair
private_key_file = ~/.ssh/ec2-ch08
# a freshly-created EC2 has an unknown host key
host_key_checking = False
interpreter_python = auto_silent
