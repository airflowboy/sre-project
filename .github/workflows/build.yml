name: build-and-push

# Only fire when the app or this workflow changes. Crucially, changes to
# deploy/** (e.g. the values.yaml that ArgoCD Image Updater rewrites in
# Chapter 07-D) must NOT trigger a rebuild — otherwise we'd loop forever.
on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/web-app   # → ghcr.io/airflowboy/sre-project/web-app

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # required to push to GHCR with GITHUB_TOKEN
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long              # immutable: sha-<full40> — what GitOps tracks
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=v2
            COMMIT=${{ github.sha }}
