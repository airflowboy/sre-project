apiVersion: apps/v1
kind: Deployment
metadata:
  name: issue-api
  labels:
    app: issue-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: issue-api
  template:
    metadata:
      labels:
        app: issue-api
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: issue-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ADDR
              value: ":8080"
            - name: REDIS_ADDR
              value: {{ .Values.env.redisAddr | quote }}
            - name: EVENT_ID
              value: {{ .Values.env.eventId | quote }}
            {{- if .Values.env.secretDbPasswordArn }}
            - name: SECRET_DB_PASSWORD_ARN
              value: {{ .Values.env.secretDbPasswordArn | quote }}
            {{- end }}
            {{- if .Values.env.kafkaBrokers }}
            - name: KAFKA_BROKERS
              value: {{ .Values.env.kafkaBrokers | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.env.kafkaTopic | quote }}
            {{- end }}
            - name: AWS_REGION
              value: ap-northeast-2
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
